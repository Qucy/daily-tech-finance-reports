# Daily Report - AI Subagent Task Definition
# This file defines the task for the subagent to generate the daily report

task_definition:
  name: "Daily Tech-Finance Report Generation"
  version: "3.0"
  
  # 输出配置
  output:
    directory: "${WORKSPACE}/reports/$(date +%Y%m)/$(date +%d)"
    files:
      - "daily_report_$(date +%Y%m%d).sc.md"  # 简体中文
      - "daily_report_$(date +%Y%m%d).en.md"  # English
  
  # 搜索配置
  search:
    # 一级信源：监管动态 (最高优先级)
    regulatory:
      - "BIS artificial intelligence banking guidance 2026"
      - "Federal Reserve AI guidance banking 2026"
      - "OCC model risk management AI 2026"
      - "EU AI Act banking financial services 2026"
      - "中国人民银行 人工智能 银行 2026"
      - "银保监会 算法 监管 2026"
      - "HKMA fintech AI guidance 2026"
      - "MAS Singapore AI finance 2026"
    
    # 二级信源：专家观点
    experts:
      - "Andrej Karpathy LLM reasoning 2026"
      - "Andrew Ng AI enterprise workflow 2026"
      - "Jim Marous digital banking AI 2026"
    
    # 二级信源：中文AI KOL
    chinese_kol:
      - "宝玉xp AI新闻 2026"
      - "宝玉xp Claude 2026"
      - "宝玉xp ChatGPT 2026"
      - "宝玉xp 大模型 2026"
      - "宝玉xp baoyu.io"
    
    # 三级信源：银行业AI应用
    banking_ai:
      - "JPMorgan COiN AI platform 2026"
      - "Goldman Sachs machine learning trading 2026"
      - "HSBC innovation AI digital 2026"
      - "招商银行 人工智能 金融科技 2026"
      - "平安银行 AI 智能风控 2026"
      - "工商银行 AI 信贷 智能体 2026"
    
    # 四级信源：技术突破
    tech_breakthroughs:
      - "GPT-5.4 benchmark 2026"
      - "Claude 4 SWE-bench 2026"
      - "DeepSeek V4 release 2026"
      - "Gemini 3.1 enterprise 2026"
      - "Qwen 3 benchmark 2026"
      - "Agentic AI enterprise adoption 2026"
  
  # 报告章节配置
  sections:
    zh_CN:
      - title: "今日主线"
        required: true
        content_type: "breaking_news"
      - title: "今日必读"
        required: true
        content_type: "tech_breakthroughs"
      - title: "专家观点"
        required: true
        experts: ["Andrej Karpathy", "Andrew Ng", "Jim Marous"]
      - title: "监管雷达"
        required: true
        template: "regulatory_radar_template.md"
      - title: "同业动态"
        required: true
        banks: ["JPMorgan", "Goldman Sachs", "招商银行", "平安银行"]
      - title: "技术-业务映射"
        required: true
      - title: "GitHub技术趋势"
        required: false
        source: "monitor_report"
      - title: "关键阈值监测表"
        required: true
        metrics:
          - name: "GPT-5.4 OSWorld-V"
            threshold: "人类72.4%"
          - name: "Claude 4 SWE-bench"
            threshold: "70%"
          - name: "DeepSeek V4 MMLU"
            threshold: "90%"
          - name: "Agentic AI企业应用"
            threshold: "50%"
      - title: "行动建议"
        required: true
    
    en_US:
      - title: "Today's Focus"
        required: true
      - title: "Must-Read Today"
        required: true
      - title: "Expert Insights"
        required: true
      - title: "Regulatory Radar"
        required: true
      - title: "Peer Bank Intelligence"
        required: true
      - title: "Tech-Business Mapping"
        required: true
      - title: "GitHub Tech Trends"
        required: false
      - title: "Key Threshold Monitoring"
        required: true
      - title: "Action Items"
        required: true
  
  # 模型筛选配置
  model_filter:
    exclude:
      - "Llama 4 Scout"  # Meta已宣布重新训练，社区反馈负面
    include:
      - "GPT-5.4"
      - "Claude 4"
      - "Gemini 3.1"
      - "DeepSeek V4"
      - "Qwen 3"
  
  # GitHub推送配置
  github:
    repo: "Qucy/daily-tech-finance-reports"
    branch: "main"
    commit_message_template: "📊 Daily Report: {date} - Bilingual"
  
  # 去重配置
  deduplication:
    check_days: 3
    max_similarity: 0.30  # 30%相似度阈值
