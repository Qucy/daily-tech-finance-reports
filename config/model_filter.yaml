## 搜索关键词优化 / Search Keyword Guidelines

### 推荐使用的限定词 / Recommended Qualifiers
- `benchmark 2026` - 确保获取最新基准测试
- `enterprise adoption` - 企业级应用动态
- `latest version` - 最新版本信息
- `production ready` - 生产就绪状态

### 避免使用的关键词 / Keywords to Avoid
- 避免直接使用模型版本号搜索过时版本
- 避免使用 `review`, `comparison` 等可能返回旧内容的词
- 避免未经验证的第三方 benchmark

