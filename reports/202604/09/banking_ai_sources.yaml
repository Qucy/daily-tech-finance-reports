# ============================================
# 第三层：三级信源（Tertiary Sources）
# 特点：Twitter/X一手爆料、GitHub趋势、KOL观点
# 优先级：中（早期信号、市场 sentiment）
# ============================================

tertiary_sources:
  # Twitter/X KOL（需要Twitter API监控）
  twitter_kol:
    - handle: "@karpathy"
      name: "Andrej Karpathy"
      focus: ["LLM", "AI infra", "Tesla/AI"]
      keywords: ["Karpathy AI", "Andrej Karpathy"]
      
    - handle: "@AndrewYNg"
      name: "Andrew Ng"
      focus: ["AI education", "Landing AI", "Enterprise AI"]
      keywords: ["Andrew Ng AI", "Andrew Ng agentic"]
      
    - handle: "@goodfellow_ian"
      name: "Ian Goodfellow"
      focus: ["GAN", "Adversarial ML", "Security"]
      keywords: ["Ian Goodfellow AI"]
      
    - handle: "@hardmaru"
      name: "David Ha"
      focus: ["Generative models", "Reinforcement learning"]
      keywords: ["David Ha AI", "hardmaru"]
      
    - handle: "@jeremyphoward"
      name: "Jeremy Howard"
      focus: ["fast.ai", "Practical ML"]
      keywords: ["Jeremy Howard fast.ai"]
      
    # 银行/金融科技领域专家
    - handle: "@bfin"
      name: "Bradley Leimer"
      focus: ["Banking innovation", "Fintech"]
      keywords: ["Bradley Leimer banking"]
      
    - handle: "@jessicahall9"
      name: "Jessica Hall"
      focus: ["Banking tech", "Digital transformation"]
      keywords: ["Jessica Hall banking"]

  # GitHub监控（需要GitHub API）
  github_trending:
    - repo: "microsoft/bank-fraud-detection"
      topic: "fraud-detection"
      
    - repo: "jpmorganchase/algorithmic-trading"
