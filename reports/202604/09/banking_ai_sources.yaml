    - search_queries:
        - "banking AI stars:>100 pushed:>2026-03-01"
        - "fraud detection machine learning stars:>50 pushed:>2026-03-01"
        - "credit scoring AI stars:>50 pushed:>2026-03-01"
        - "anti-money laundering AML AI stars:>30 pushed:>2026-03-01"

  # 中文 AI KOL / 博主
  chinese_kol:
    - name: "宝玉xp"
      platform: "微博 / Weibo"
      url: "https://weibo.com/u/1727858283"
      blog: "https://baoyu.io/blog"
      description: "前微软Asp.Net MVP，111万+粉丝，最具影响力AI大V，2025微博年度新知博主。专注AI大模型、编程工具、Agent技术的中文科技博主。"
      focus: ["AI大模型", "Claude", "ChatGPT", "Agent", "编程工具", "AI应用"]
      keywords: 
