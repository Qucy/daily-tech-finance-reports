    - name: "FCA - Financial Conduct Authority"
      url: "https://www.fca.org.uk"
      keywords: ["FCA AI regulation", "Financial Conduct Authority artificial intelligence"]
      frequency: "weekly"
      
    - name: "EBA - European Banking Authority"
      url: "https://www.eba.europa.eu"
      keywords: ["EBA AI", "European Banking Authority machine learning"]
      frequency: "monthly"
      
    - name: "ECB - European Central Bank"
