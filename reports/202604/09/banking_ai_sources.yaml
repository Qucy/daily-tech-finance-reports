    - id: "competitor_intel"
      name: "同业动态"
      sources: ["bank_official", "competitors"]
      priority: "high"
      
    - id: "tech_breakthrough"
      name: "技术突破"
      sources: ["academic", "github_trending", "twitter_kol"]
      priority: "high"
      
    - id: "market_investment"
      name: "市场与投资"
      sources: ["ai_investment", "consulting"]
      priority: "medium"
      
    - id: "infrastructure"
      name: "基础设施"
      sources: ["ai_infrastructure"]
      priority: "medium"

