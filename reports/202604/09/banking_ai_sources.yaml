    - name: "Citi Innovation"
      url: "https://www.citigroup.com/technology"
      keywords: ["Citi AI", "Citigroup artificial intelligence"]
      frequency: "bi-weekly"
      
    - name: "Morgan Stanley Technology"
      url: "https://www.morganstanley.com/im"
      keywords: ["Morgan Stanley AI", "Morgan Stanley machine learning"]
      frequency: "bi-weekly"
      
    - name: "Bank of America Technology"
      url: "https://www.bankofamerica.com/tech-innovation"
      keywords: ["Bank of America AI", "BofA machine learning"]
      frequency: "bi-weekly"
      
    - name: "招商银行 FinTech"
