      url: "http://www.csrc.gov.cn"
      keywords: ["证监会 AI", "证券 人工智能 监管", "CSRC algorithm trading"]
      frequency: "bi-weekly"

  # 顶级银行官方博客/研发
  bank_official:
    - name: "JPMorgan Tech Blog"
      url: "https://www.jpmorgan.com/technology"
      keywords: ["JPMorgan AI", "JPM COiN", "JPMorgan machine learning"]
