        - "宝玉 xp AI"
        - "baoyu.io"
      frequency: "daily"
      priority: "high"
      content_type: "AI新闻翻译/评论、产品体验、技术趋势分析"
      
    - name: "高飞"
      platform: "微博 / Weibo"
      focus: ["AI", "科技评论"]
      keywords: ["高飞 AI"]
      frequency: "daily"
      
    - name: "阑夕"
      platform: "微博 / Weibo"
      focus: ["科技", "互联网"]
      keywords: ["阑夕 AI"]
      frequency: "daily"

