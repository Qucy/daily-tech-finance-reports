# 优先级：最高（必须覆盖）
# ============================================

primary_sources:
  # 国际监管机构
  regulatory_intl:
    - name: "BIS - Bank for International Settlements"
      url: "https://www.bis.org"
      keywords: ["BIS AI banking", "Bank for International Settlements artificial intelligence"]
      frequency: "weekly"
      
    - name: "FSB - Financial Stability Board"
      url: "https://www.fsb.org"
      keywords: ["FSB AI financial stability", "Financial Stability Board AI"]
      frequency: "monthly"
      
