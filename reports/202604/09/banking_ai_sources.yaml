    - name: "平安银行"
      channels:
        - "http://bank.pingan.com/fintech/"
      keywords: ["平安银行 AI", "平安银行 人工智能", "平安 fintech"]

  # 招聘信号监控（LinkedIn Jobs API）
  hiring_signals:
    companies:
      - "JPMorgan Chase"
      - "Goldman Sachs"
      - "Bank of America"
      - "Citigroup"
      - "Morgan Stanley"
      - "招商银行"
      - "平安银行"
