# ============================================
# 搜索关键词模板
# 按主题组织的搜索组合
# ============================================

search_templates:
  # 主题1: 监管合规
  regulatory:
    base: "AI regulation banking {date}"
    variations:
      - "AI Act banking compliance"
      - "algorithmic accountability banking"
      - "model risk management AI"
      - "AI governance framework bank"
      - "监管 银行 人工智能 {date}"
      - "AI 合规 银行 {date}"

  # 主题2: 银行业AI应用
  banking_applications:
    base: "AI banking {date}"
    variations:
      - "credit scoring AI bank"
      - "fraud detection machine learning"
      - "anti-money laundering AI"
      - "algorithmic trading AI"
      - "customer service chatbot bank"
      - "智能风控 银行 {date}"
      - "AI 信贷审批 {date}"
      - "反欺诈 人工智能 银行 {date}"

  # 主题3: 技术突破
  tech_breakthrough:
    base: "AI breakthrough {date}"
    variations:
      - "LLM finance application"
      - "agentic AI enterprise"
      - "RAG banking knowledge"
      - "multimodal AI financial"

  # 主题4: 竞争对手动态
  competitor:
    base: "{bank} AI {date}"
    banks:
      - "JPMorgan"
      - "Goldman Sachs"
      - "Bank of America"
      - "招商银行"
      - "平安银行"

